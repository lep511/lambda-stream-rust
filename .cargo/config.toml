# Optimización para AWS Graviton4 (Neoverse V2)
# Lambda arm64 en provided.al2023 corre sobre Graviton — compilar nativo.

[target.aarch64-unknown-linux-gnu]
rustflags = [
    "-C", "target-cpu=neoverse-v2",   # Graviton4: SVE2, BF16, I8MM, CSSC
    "-C", "link-arg=-Wl,-z,now",      # Full RELRO — reduce PLT overhead
    "-C", "link-arg=-Wl,-O1",         # Optimización del linker
]

[build]
target = "aarch64-unknown-linux-gnu"
